# Render Blueprint (SAFE / web service only)
#
# This file intentionally creates ONLY the API web service.
# Do NOT use the older multi-cron Blueprint unless you want extra paid services.
#
# Current recommended setup:
#   1. Keep your existing Render Web Service for the API.
#   2. Add the env vars below in the Render dashboard.
#   3. Use ONE market tick cron externally or as a single Render Cron Job:
#        POST https://pre-richard-tion-api.onrender.com/api/admin/tick-markets
#        Header: x-admin-api-key: <ADMIN_API_KEY>
#      every 1 minute.
#
# The API must stay on Node 24 because the Supabase realtime dependency path
# needs native WebSocket support.

services:
  - type: web
    name: pre-richard-tion-api
    runtime: node
    plan: free
    buildCommand: npm install --include=dev --legacy-peer-deps --ignore-scripts && npm run build:server
    startCommand: npm run server
    envVars:
      - key: NODE_VERSION
        value: "24.14.1"
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://pre-richard-tion.fun,https://www.pre-richard-tion.fun,http://localhost:5173,http://localhost:5174
      - key: DEPOSIT_CONFIRMATION
        value: confirmed
      - key: ADMIN_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: HELIUS_RPC_URL
        sync: false
      - key: TROLL_MINT
        sync: false
      - key: ESCROW_AUTHORITY_SECRET
        sync: false
